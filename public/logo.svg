<svg width="172" height="44" viewBox="0 0 172 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark ── -->
  <rect y="2" width="40" height="40" rx="9" fill="url(#lg)"/>
  <!-- F vertical bar -->
  <rect x="10" y="12" width="4.5" height="21" rx="2.25" fill="white"/>
  <!-- F top bar -->
  <rect x="10" y="12" width="19" height="4.5" rx="2.25" fill="white"/>
  <!-- F middle bar -->
  <rect x="10" y="19.5" width="13" height="4" rx="2" fill="white"/>
  <!-- Circuit nodes -->
  <circle cx="29" cy="14.25" r="2.8" fill="white" fill-opacity="0.55"/>
  <circle cx="23" cy="21.5"  r="2.2" fill="white" fill-opacity="0.4"/>
  <rect x="28.5" y="17.5" width="1.5" height="5" rx="0.75" fill="white" fill-opacity="0.3"/>

  <!-- ── Wordmark ── -->
  <text
    x="52" y="30"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.5"
    fill="#0f172a">Faxio</text>

  <text
    x="114" y="30"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="500"
    letter-spacing="-0.3"
    fill="#2563eb">Tech</text>

  <!-- Dot accent between words -->
  <circle cx="110" cy="27" r="2.2" fill="#2563eb" fill-opacity="0.25"/>
</svg>
